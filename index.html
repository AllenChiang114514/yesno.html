<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>點頭搖頭回答是非題</title>

    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@1.3.1/dist/tf.min.js"></script>

    <script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@0.8/dist/teachablemachine-image.min.js"></script>

    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            background: #f7f7f7;
        }

        h1 {
            color: #333;
        }

        #webcam-container {
            margin-top: 20px;
        }

        .question {
            font-size: 30px;
            font-weight: bold;
            margin: 20px;
            color: #0066cc;
        }

        .result {
            font-size: 28px;
            margin-top: 20px;
            color: darkgreen;
            font-weight: bold;
            height: 40px;
        }

        button {
            font-size: 22px;
            padding: 10px 20px;
            margin: 10px;
            cursor: pointer;
        }

        button:disabled {
            background-color: #ccc;
            cursor: not-allowed;
        }

        #score {
            font-size: 24px;
            margin-top: 20px;
            color: #cc0000;
            font-weight: bold;
        }
        
        .timer {
            color: #ff8c00;
        }
        
        .loading {
            color: #666;
        }
    </style>
</head>

<body>
    <h1>🙆 點頭 / 🙅 搖頭 是非題</h1>

    <button id="start-btn" onclick="init()">啟動鏡頭</button>
    <button onclick="nextQuestion()">跳過/下一題</button>

    <div class="question" id="question">請先點擊啟動鏡頭</div>

    <div id="webcam-container"></div>
    <div id="label-container"></div>

    <div class="result" id="speech-result"></div>
    <div id="score">得分：0</div>

    <script>
        const URL = "https://teachablemachine.withgoogle.com/models/lbUjxSw14/";

        let model, webcam, labelContainer, maxPredictions;
        let lastAnswer = "";
        let score = 0;
        let currentQuestion = 0;
        let answered = false;
        let isBuffering = false; 

        const questions = [
            { q: "1 + 1 = 2 ?", answer: "Yes" },
            { q: "貓會飛 ?", answer: "No" },
            { q: "太陽從東邊升起 ?", answer: "Yes" },
            { q: "魚住在天空 ?", answer: "No" },
            { q: "台灣在亞洲 ?", answer: "Yes" }
        ];

        async function init() {
            // 1. 介面切換到「載入中」狀態，並鎖定按鈕避免重複點擊
            const startBtn = document.getElementById("start-btn");
            startBtn.disabled = true;
            document.getElementById("question").innerText = "模型載入與暖機中...";
            document.getElementById("speech-result").innerHTML = "<span class='loading'>⚙️ 正在啟動 AI 引擎，請稍候約 3~5 秒...</span>";

            const modelURL = URL + "model.json";
            const metadataURL = URL + "metadata.json";

            model = await tmImage.load(modelURL, metadataURL);
            maxPredictions = model.getTotalClasses();

            webcam = new tmImage.Webcam(320, 240, true); 
            await webcam.setup();
            await webcam.play();
            window.requestAnimationFrame(loop);

            document.getElementById("webcam-container").innerHTML = "";
            document.getElementById("webcam-container").appendChild(webcam.canvas);

            labelContainer = document.getElementById("label-container");
            labelContainer.innerHTML = "";
            for (let i = 0; i < maxPredictions; i++) {
                labelContainer.appendChild(document.createElement("div"));
            }

            // ★★★ 核心解法：偷偷預測一次來「暖機 (Warm-up)」★★★
            // 讓這段最卡頓的運算在背景先跑完，第一題就不會卡了
            await model.predict(webcam.canvas); 

            // 2. 暖機完成，解鎖按鈕並進入第一題
            startBtn.disabled = false;
            currentQuestion = 0;
            score = 0;
            updateScore();
            showQuestion();
        }

        async function showQuestion() {
            answered = false;
            isBuffering = true; 
            lastAnswer = "";    
            
            document.getElementById("question").innerText = questions[currentQuestion].q;
            speak(questions[currentQuestion].q);

            for (let i = 3; i > 0; i--) {
                document.getElementById("speech-result").innerHTML = `<span class="timer">⏳ 請準備... ${i} 秒</span>`;
                await new Promise(resolve => setTimeout(resolve, 1000));
            }

            document.getElementById("speech-result").innerText = "👉 請作答！(點頭/搖頭)";
            isBuffering = false; 
        }

        function nextQuestion() {
            currentQuestion++;
            if (currentQuestion >= questions.length) {
                document.getElementById("question").innerText =
                    "🎉 測驗結束！總分：" + score + " / " + questions.length;
                document.getElementById("speech-result").innerText = "";
                speak("測驗結束，你得到 " + score + " 分");
                isBuffering = true; 
                return;
            }
            showQuestion();
        }

        async function loop() {
            webcam.update();
            await predict();
            window.requestAnimationFrame(loop);
        }

        async function predict() {
            if (answered || isBuffering) return;

            const predictions = await model.predict(webcam.canvas);

            let bestClass = "";
            let bestProb = 0;

            for (let i = 0; i < maxPredictions; i++) {
                const prob = predictions[i].probability;
                const text =
                    predictions[i].className + " : " +
                    (prob * 100).toFixed(1) + "%";

                labelContainer.childNodes[i].innerHTML = text;

                if (prob > bestProb) {
                    bestProb = prob;
                    bestClass = predictions[i].className;
                }
            }

            if (bestProb > 0.90 && bestClass !== lastAnswer) {
                
                let mappedAnswer = "";
                if (bestClass === "class1" || bestClass === "Class 1") {
                    mappedAnswer = "Yes";
                } else if (bestClass === "class2" || bestClass === "Class 2") {
                    mappedAnswer = "No";
                }

                if (mappedAnswer !== "") {
                    checkAnswer(mappedAnswer);
                    lastAnswer = bestClass; 
                }
            }
        }

        function checkAnswer(userAnswer) {
            answered = true;

            const correctAnswer = questions[currentQuestion].answer;
            let message = "";

            if (userAnswer === correctAnswer) {
                score++;
                message = "✅ 答對了！";
            } else {
                message = "❌ 答錯了！";
            }

            document.getElementById("speech-result").innerText = message;
            updateScore();
            speak(message);

            setTimeout(nextQuestion, 2500);
        }

        function updateScore() {
            document.getElementById("score").innerText = "得分：" + score;
        }

        function speak(text) {
            speechSynthesis.cancel(); 
            const utterance = new SpeechSynthesisUtterance(text);
            utterance.lang = "zh-TW";
            utterance.rate = 1;
            utterance.pitch = 1;
            speechSynthesis.speak(utterance);
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>點頭搖頭回答是非題</title>
     <script src="tf.min.js"></script>
    <script src="teachablemachine-image.min.js"></script>
    <style>
        body {
            font-family: 'Microsoft JhengHei', Arial, sans-serif;
            text-align: center;
            background: #f0f2f5;
            padding-bottom: 50px;
        }
        .container {
            max-width: 600px;
            margin: 0 auto;
            background: white;
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        #webcam-container {
            margin-top: 20px;
            border: 5px solid #ddd;
            border-radius: 10px;
            overflow: hidden;
            display: inline-block;
            background: #000;
        }
        .question-box {
            background: #e7f3ff;
            padding: 20px;
            border-radius: 10px;
            margin: 20px 0;
            min-height: 80px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        #question {
            font-size: 28px;
            font-weight: bold;
            color: #0056b3;
        }
        .status-badge {
            display: inline-block;
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 18px;
            margin-bottom: 10px;
            font-weight: bold;
        }
        .status-off { background: #ffcccc; color: #cc0000; }
        .status-on  { background: #ccffcc; color: #008800; }
        .result {
            font-size: 32px;
            margin-top: 15px;
            font-weight: bold;
            min-height: 50px;
        }
        button {
            font-size: 20px;
            padding: 12px 25px;
            margin: 10px;
            cursor: pointer;
            border: none;
            border-radius: 8px;
            background-color: #007bff;
            color: white;
            transition: 0.3s;
        }
        button:hover    { background-color: #0056b3; }
        button:disabled { background-color: #ccc; cursor: not-allowed; }
        #score { font-size: 24px; color: #d9534f; font-weight: bold; margin-top: 10px; }
        #timer-text { color: #f0ad4e; font-size: 28px; }
        #debug-box {
            font-size: 13px;
            color: #555;
            background: #f9f9f9;
            border: 1px solid #ddd;
            border-radius: 8px;
            padding: 8px;
            margin-top: 10px;
            text-align: left;
        }
    </style>
</head>
<body>
    <h1>🧠 是非題挑戰：點頭或搖頭</h1>
    <div class="container">
        <div id="setup-area">
            <button id="init-btn" onclick="init()">第一步：啟動鏡頭與暖機</button>
            <button id="start-btn" onclick="startQuiz()" style="display:none; background-color: #28a745;">第二步：開始挑戰！</button>
        </div>
        <div class="question-box">
            <div id="question">請先啟動鏡頭</div>
        </div>
        <div>
            <span id="status-display" class="status-badge status-off">AI 尚未啟動</span>
        </div>
        <div id="webcam-container"></div>
        <div class="result" id="speech-result"></div>
        <div id="score">目前得分：0</div>
        <div id="debug-box">等待啟動...</div>
    </div>

    <script>
        const MODEL_URL = "https://teachablemachine.withgoogle.com/models/ZfRSv4gzD/";

        // ── 模型與鏡頭 ──────────────────────────────
        let model, webcam, maxPredictions;
        let classNames = []; // 記錄模型真實 class 名稱

        // ── 遊戲狀態（只用一個 phase 旗標，不再用多個 boolean） ──
        // phase: "idle" | "countdown" | "waiting" | "judging" | "done"
        let phase = "idle";
        let score = 0;
        let currentQuestion = 0;

        // 連續幀確認
        const CONFIRM_FRAMES = 3;
        const THRESHOLD = 0.88; // 略降，避免正確動作被卡住
        let consecutiveCount = 0;
        let lastDetected = "";

        // ── 題目 ────────────────────────────────────
        const questions = [
            { q: "1 + 1 = 2 ?",       answer: "Yes" },
            { q: "貓會飛 ?",            answer: "No"  },
            { q: "太陽從東邊升起 ?",    answer: "Yes" },
            { q: "魚住在天空 ?",        answer: "No"  },
            { q: "台灣在亞洲 ?",        answer: "Yes" }
        ];

        // ── 初始化 ──────────────────────────────────
        async function init() {
            document.getElementById("init-btn").disabled = true;
            document.getElementById("question").innerText = "模型載入中，請稍候...";

            model = await tmImage.load(MODEL_URL + "model.json", MODEL_URL + "metadata.json");
            maxPredictions = model.getTotalClasses();

            // 記錄真實 class 名稱 → 用於 debug 和比對
            const meta = await fetch(MODEL_URL + "metadata.json").then(r => r.json());
            classNames = meta.labels || [];
            debugLog("模型 class 名稱：" + JSON.stringify(classNames));

            webcam = new tmImage.Webcam(320, 240, true);
            await webcam.setup();
            await webcam.play();
            document.getElementById("webcam-container").appendChild(webcam.canvas);

            // 暖機
            await model.predict(webcam.canvas);

            // 啟動 loop
            requestAnimationFrame(loop);

            document.getElementById("question").innerText = "準備好了！請點擊「開始挑戰」";
            document.getElementById("init-btn").style.display = "none";
            document.getElementById("start-btn").style.display = "inline-block";
        }

        // ── 主 loop（永遠跑，不會停） ───────────────
        function loop() {
            webcam.update();
            predict();
            requestAnimationFrame(loop);
        }

        // ── 辨識（同步邏輯，不用 await 避免競爭） ──
        function predict() {
            if (phase !== "waiting") {
                consecutiveCount = 0;
                lastDetected = "";
                return;
            }

            // tmImage predict 回傳 Promise，用 .then 避免 async/await 競爭
            model.predict(webcam.canvas).then(predictions => {
                if (phase !== "waiting") return; // double-check

                let bestClass = "";
                let bestProb  = 0;
                let debugStr  = "";

                predictions.forEach((p, i) => {
                    const pct = (p.probability * 100).toFixed(0);
                    debugStr += `[${p.className}]: ${pct}%　`;
                    if (p.probability > bestProb) {
                        bestProb  = p.probability;
                        bestClass = p.className;
                    }
                });
                debugLog(debugStr);

                if (bestProb < THRESHOLD) {
                    consecutiveCount = 0;
                    lastDetected = "";
                    return;
                }

                // ── 判斷 Yes / No ──────────────────────
                // 策略：先用 index（index 0 = 訓練第一個 class）
                // 同時也比對名稱，兩者任一符合即可
                const bestIndex = predictions.indexOf(predictions.find(p => p.className === bestClass));
                const nameLower = bestClass.toLowerCase().replace(/\s+/g, "");

                let userAns = "";

                // YES 判斷：index 0，或名稱含 yes / 點頭 / nod
                if (bestIndex === 0 || nameLower.includes("yes") || nameLower.includes("點頭") || nameLower.includes("nod")) {
                    userAns = "Yes";
                }
                // NO 判斷：index 1，或名稱含 no / 搖頭 / shake
                else if (bestIndex === 1 || nameLower.includes("no") || nameLower.includes("搖頭") || nameLower.includes("shake")) {
                    userAns = "No";
                }

                if (userAns === "") return;

                if (userAns === lastDetected) {
                    consecutiveCount++;
                } else {
                    lastDetected    = userAns;
                    consecutiveCount = 1;
                }

                if (consecutiveCount >= CONFIRM_FRAMES) {
                    consecutiveCount = 0;
                    lastDetected    = "";
                    checkAnswer(userAns);
                }
            });
        }

        // ── 開始測驗 ─────────────────────────────────
        function startQuiz() {
            // 重置所有 UI 回初始狀態
            score            = 0;
            currentQuestion  = 0;
            consecutiveCount = 0;
            lastDetected     = "";
            phase            = "idle";

            updateScore();
            document.getElementById("speech-result").innerText = "";
            document.getElementById("start-btn").style.display = "none";
            document.getElementById("start-btn").innerText = "第二步：開始挑戰！";
            updateStatus(false);
            debugLog("測驗開始");

            // 給瀏覽器一幀時間更新畫面再進入題目
            setTimeout(() => runQuestion(), 80);
        }

        // ── 顯示題目 + 倒數（用遞迴 setTimeout，不用 async/await） ──
        function runQuestion() {
            phase            = "countdown";
            consecutiveCount = 0;
            lastDetected     = "";
            updateStatus(false);

            document.getElementById("question").innerText =
                `第 ${currentQuestion + 1} 題：${questions[currentQuestion].q}`;
            speak(questions[currentQuestion].q);

            countdown(3);
        }

        function countdown(n) {
            if (n > 0) {
                document.getElementById("speech-result").innerHTML =
                    `<span id="timer-text">⏳ 準備作答... ${n}</span>`;
                setTimeout(() => countdown(n - 1), 1000);
            } else {
                // 倒數結束 → 開放作答
                document.getElementById("speech-result").innerText = "🔥 請作答！(點頭/搖頭)";
                consecutiveCount = 0;
                lastDetected     = "";
                updateStatus(true);
                phase = "waiting"; // ← 這裡才開放辨識
            }
        }

        // ── 判斷答案 ─────────────────────────────────
        function checkAnswer(userAnswer) {
            phase = "judging"; // 立刻鎖住，防止重複觸發
            updateStatus(false);

            const correct   = questions[currentQuestion].answer;
            const isCorrect = (userAnswer === correct);

            debugLog(`使用者答：${userAnswer}，正確答案：${correct}，結果：${isCorrect ? "✅" : "❌"}`);

            if (isCorrect) {
                score++;
                document.getElementById("speech-result").innerHTML =
                    "<span style='color:green'>✅ 太棒了！答對了</span>";
                speak("答對了");
            } else {
                document.getElementById("speech-result").innerHTML =
                    "<span style='color:red'>❌ 可惜答錯了</span>";
                speak("答錯了");
            }
            updateScore();

            setTimeout(() => {
                currentQuestion++;
                if (currentQuestion < questions.length) {
                    runQuestion();
                } else {
                    phase = "done";
                    document.getElementById("question").innerText  = "🎊 挑戰完成！";
                    document.getElementById("speech-result").innerText =
                        `總得分：${score} / ${questions.length}`;
                    speak(`測驗結束，你得到 ${score} 分`);
                    const btn = document.getElementById("start-btn");
                    btn.innerText           = "🔄 再玩一次";
                    btn.style.display       = "inline-block";
                    btn.style.backgroundColor = "#28a745";
                }
            }, 2500);
        }

        // ── 工具函式 ──────────────────────────────────
        function updateStatus(on) {
            const el = document.getElementById("status-display");
            if (on) {
                el.innerText   = "● AI 辨識中 (可作答)";
                el.className   = "status-badge status-on";
            } else {
                el.innerText   = "○ 暫停辨識";
                el.className   = "status-badge status-off";
            }
        }

        function updateScore() {
            document.getElementById("score").innerText = "目前得分：" + score;
        }

        function speak(text) {
            speechSynthesis.cancel();
            const u = new SpeechSynthesisUtterance(text);
            u.lang = "zh-TW";
            speechSynthesis.speak(u);
        }

        function debugLog(msg) {
            document.getElementById("debug-box").innerText = msg;
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>點頭搖頭回答是非題 - 終極穩定版</title>

    <!-- 線上版 TensorFlow.js -->
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@1.3.1/dist/tf.min.js"></script>

    <!-- 線上版 Teachable Machine Image -->
    <script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@0.8/dist/teachablemachine-image.min.js"></script>

    <style>
        body {
            font-family: 'Microsoft JhengHei', Arial, sans-serif;
            text-align: center;
            background: #f0f2f5;
            padding-bottom: 50px;
        }

        .container {
            max-width: 600px;
            margin: 0 auto;
            background: white;
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        #webcam-container {
            margin-top: 20px;
            border: 5px solid #ddd;
            border-radius: 10px;
            overflow: hidden;
            display: inline-block;
            background: #000;
        }

        .question-box {
            background: #e7f3ff;
            padding: 20px;
            border-radius: 10px;
            margin: 20px 0;
            min-height: 80px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        #question {
            font-size: 28px;
            font-weight: bold;
            color: #0056b3;
        }

        .status-badge {
            display: inline-block;
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 18px;
            margin-bottom: 10px;
            font-weight: bold;
        }

        .status-off { background: #ffcccc; color: #cc0000; }
        .status-on { background: #ccffcc; color: #008800; }

        .result {
            font-size: 32px;
            margin-top: 15px;
            font-weight: bold;
            height: 50px;
        }

        button {
            font-size: 20px;
            padding: 12px 25px;
            margin: 10px;
            cursor: pointer;
            border: none;
            border-radius: 8px;
            background-color: #007bff;
            color: white;
            transition: 0.3s;
        }

        button:hover { background-color: #0056b3; }
        button:disabled { background-color: #ccc; cursor: not-allowed; }

        #score {
            font-size: 24px;
            color: #d9534f;
            font-weight: bold;
            margin-top: 10px;
        }
        
        #timer-text { color: #f0ad4e; font-size: 28px; }
    </style>
</head>

<body>
    <h1>🧠 是非題挑戰：點頭或搖頭</h1>

    <div class="container">
        <div id="setup-area">
            <button id="init-btn" onclick="init()">第一步：啟動鏡頭與暖機</button>
            <button id="start-btn" onclick="startQuiz()" style="display:none; background-color: #28a745;">第二步：開始挑戰！</button>
        </div>

        <div class="question-box">
            <div id="question">請先啟動鏡頭</div>
        </div>

        <div>
            <span id="status-display" class="status-badge status-off">AI 尚未啟動</span>
        </div>

        <div id="webcam-container"></div>
        
        <div class="result" id="speech-result"></div>
        <div id="score">目前得分：0</div>
        
        <!-- 顯示辨識數據，幫助確認有沒有抓到動作 -->
        <div id="label-container" style="font-size: 14px; color: #666; margin-top: 10px; font-weight: bold;"></div>
    </div>

    <script>
        const URL = "https://teachablemachine.withgoogle.com/models/lbUjxSw14/";

        let model, webcam, labelContainer, maxPredictions;
        let score = 0;
        let currentQuestion = 0;
        let answered = false;
        let isBuffering = true; 

        const questions = [
            { q: "1 + 1 = 2 ?", answer: "Yes" },
            { q: "貓會飛 ?", answer: "No" },
            { q: "太陽從東邊升起 ?", answer: "Yes" },
            { q: "魚住在天空 ?", answer: "No" },
            { q: "台灣在亞洲 ?", answer: "Yes" }
        ];

        async function init() {
            document.getElementById("init-btn").disabled = true;
            document.getElementById("question").innerText = "模型載入中，請稍候...";
            
            model = await tmImage.load(URL + "model.json", URL + "metadata.json");
            maxPredictions = model.getTotalClasses();

            webcam = new tmImage.Webcam(320, 240, true); 
            await webcam.setup();
            await webcam.play();
            window.requestAnimationFrame(loop);

            document.getElementById("webcam-container").appendChild(webcam.canvas);
            labelContainer = document.getElementById("label-container");
            for (let i = 0; i < maxPredictions; i++) labelContainer.appendChild(document.createElement("div"));

            // 暖機 (Warm-up)
            await model.predict(webcam.canvas); 

            document.getElementById("question").innerText = "準備好了！請點擊下方的「開始挑戰」";
            document.getElementById("init-btn").style.display = "none";
            document.getElementById("start-btn").style.display = "inline-block";
        }

        function startQuiz() {
            document.getElementById("start-btn").style.display = "none";
            currentQuestion = 0;
            score = 0;
            updateScore();
            showQuestion();
        }

        async function showQuestion() {
            answered = false;
            isBuffering = true; 
            updateStatus(false);
            
            document.getElementById("question").innerText = `第 ${currentQuestion + 1} 題：${questions[currentQuestion].q}`;
            speak(questions[currentQuestion].q);

            // 緩衝倒數 3 秒，讓使用者聽題並準備
            for (let i = 3; i > 0; i--) {
                document.getElementById("speech-result").innerHTML = `<span id="timer-text">⏳ 準備作答... ${i}</span>`;
                await new Promise(r => setTimeout(r, 1000));
            }

            document.getElementById("speech-result").innerText = "🔥 請作答！(點頭/搖頭)";
            updateStatus(true);
            isBuffering = false; 
        }

        async function loop() {
            webcam.update();
            await predict();
            window.requestAnimationFrame(loop);
        }

        async function predict() {
            // 如果已經答過這題，或還在倒數緩衝中，就不做判定
            if (answered || isBuffering) return;

            const predictions = await model.predict(webcam.canvas);
            let bestClass = "";
            let bestProb = 0;

            for (let i = 0; i < maxPredictions; i++) {
                const prob = predictions[i].probability;
                labelContainer.childNodes[i].innerHTML = `${predictions[i].className}: ${(prob * 100).toFixed(0)}%`;
                
                if (prob > bestProb) { 
                    bestProb = prob; 
                    bestClass = predictions[i].className; 
                }
            }

            // 門檻設定為 80% (0.80)，只要動作有做出來就能輕鬆判定
            if (bestProb > 0.80) {
                let userAns = "";
                
                // 將抓到的名稱全部轉為小寫並去空白，無敵辨識法
                let checkName = bestClass.toLowerCase().replace(/\s+/g, '');

                // 判斷點頭 (Yes)
                if (checkName === "class1" || checkName === "yes" || bestClass.includes("點頭")) {
                    userAns = "Yes";
                } 
                // 判斷搖頭 (No)
                else if (checkName === "class2" || checkName === "no" || bestClass.includes("搖頭")) {
                    userAns = "No";
                }

                // 如果有對應到答案，就送出
                if (userAns !== "") {
                    checkAnswer(userAns);
                }
            }
        }

        function checkAnswer(userAnswer) {
            answered = true;
            isBuffering = true;
            updateStatus(false);

            const correct = questions[currentQuestion].answer;
            const isCorrect = (userAnswer === correct);
            
            if (isCorrect) {
                score++;
                document.getElementById("speech-result").innerHTML = "<span style='color:green'>✅ 太棒了！答對了</span>";
                speak("答對了");
            } else {
                document.getElementById("speech-result").innerHTML = "<span style='color:red'>❌ 可惜答錯了</span>";
                speak("答錯了");
            }

            updateScore();

            // 答題後等待 2.5 秒，再切換下一題
            setTimeout(() => {
                currentQuestion++;
                if (currentQuestion < questions.length) {
                    showQuestion();
                } else {
                    document.getElementById("question").innerText = "🎊 挑戰完成！";
                    document.getElementById("speech-result").innerText = `總得分：${score} / ${questions.length}`;
                    speak(`測驗結束，你得到 ${score} 分`);
                    document.getElementById("start-btn").innerText = "再玩一次";
                    document.getElementById("start-btn").style.display = "inline-block";
                }
            }, 2500);
        }

        function updateStatus(on) {
            const el = document.getElementById("status-display");
            if (on) {
                el.innerText = "● AI 辨識中 (可作答)";
                el.className = "status-badge status-on";
            } else {
                el.innerText = "○ 暫停辨識";
                el.className = "status-badge status-off";
            }
        }

        function updateScore() { 
            document.getElementById("score").innerText = "目前得分：" + score; 
        }

        function speak(text) {
            speechSynthesis.cancel(); 
            const u = new SpeechSynthesisUtterance(text);
            u.lang = "zh-TW";
            speechSynthesis.speak(u);
        }
    </script>
</body>
</html>
